<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saver3D - Atelier Bouteille</title>
    
    <link rel="stylesheet" href="css/structure.css">
    <link rel="stylesheet" href="css/theme.css">
    
    <script src="https://unpkg.com/three@0.126.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.126.0/examples/js/exporters/STLExporter.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <section id="Page-menu" class="hidden">
        <div class="menu-split-container">
            <div class="menu-col-left">
                <div class="menu-left-panel">
                    <h1 class="menu-title">Saver3D</h1>
                    <button id="btn-new-project" class="menu-big-btn"><span>+</span> NOUVEAU</button>
                    <button id="btn-open-project" class="menu-big-btn secondary"><span>📂</span> OUVRIR</button>
                    <input type="file" id="file-loader" class="hidden-file">
                </div>
            </div>
            <div class="menu-col-right"></div>
        </div>
    </section>

    <section id="Page-Bouteille">
        
        <aside id="Panel-gauche">
            <div class="panel-logo-col">
                <div class="panel-logo panel-col-tab active" id="panel-tab-sections" title="Sections" role="button" tabindex="0">🥃</div>
                <div class="panel-logo panel-col-tab" id="panel-tab-gravure" title="Gravures" role="button" tabindex="0">✏️</div>
            </div>
            <div class="panel-content" id="panel-content-sections">
            <!-- Modèle par 6 sections : hauteur / largeur / profondeur + rattachements (courbes) entre sections -->

            <div class="setting-card">
                <button class="accordion main-accordion">1 — Pied</button>
                <div class="panel-controls">
                    <div class="control-group">
                        <div class="label-row"><label>Hauteur (mm)</label><div class="input-wrapper"><input type="number" id="s1-h" value="0" min="0" max="80"><span class="unit">mm</span></div></div>
                        <input type="range" id="s1-h-slider" min="0" max="80" step="0.5" value="0">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Largeur (mm)</label><div class="input-wrapper"><input type="number" id="s1-L" value="71" min="40" max="120"><span class="unit">mm</span></div></div>
                        <input type="range" id="s1-L-slider" min="40" max="120" step="0.5" value="71">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Profondeur (mm)</label><div class="input-wrapper"><input type="number" id="s1-P" value="71" min="40" max="120"><span class="unit">mm</span></div></div>
                        <input type="range" id="s1-P-slider" min="40" max="120" step="0.5" value="71">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Forme</label><div class="input-wrapper"><select id="s1-forme"><option value="rond">Rond (actuel)</option><option value="carre">Carré</option></select></div></div>
                    </div>
                    <div class="control-group js-carre-niveau" data-section="1" style="display: none;">
                        <div class="label-row"><label>Niveau de carré</label><span class="carre-niveau-value">0 %</span></div>
                        <input type="range" id="s1-carre-niveau" min="0" max="100" value="0">
                    </div>
                </div>
            </div>

            <div class="setting-card setting-card--rattachement">
                <button class="accordion sub-accordion">Rattachement 1</button>
                <div class="panel-controls">
                    <div class="control-group">
                        <div class="label-row"><label>Profil</label><div class="input-wrapper"><select id="r12-type"><option value="ligne">Ligne</option><option value="courbe">Courbe</option><option value="courbeS">Courbe S</option></select></div></div>
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Rayon courbure ρ (mm)</label><div class="input-wrapper"><input type="number" id="r12-rho" value="5" min="0" max="50"><span class="unit">mm</span></div></div>
                        <input type="range" id="r12-rho-slider" min="0" max="50" step="0.5" value="5">
                    </div>
                </div>
            </div>

            <div class="setting-card">
                <button class="accordion main-accordion">2 — Corps</button>
                <div class="panel-controls">
                    <div class="control-group">
                        <div class="label-row"><label>Hauteur (mm)</label><div class="input-wrapper"><input type="number" id="s2-h" value="10" min="0" max="350"><span class="unit">mm</span></div></div>
                        <input type="range" id="s2-h-slider" min="0" max="350" step="1" value="10">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Largeur (mm)</label><div class="input-wrapper"><input type="number" id="s2-L" value="85" min="40" max="120"><span class="unit">mm</span></div></div>
                        <input type="range" id="s2-L-slider" min="40" max="120" step="0.5" value="85">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Profondeur (mm)</label><div class="input-wrapper"><input type="number" id="s2-P" value="85" min="40" max="120"><span class="unit">mm</span></div></div>
                        <input type="range" id="s2-P-slider" min="40" max="120" step="0.5" value="85">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Forme</label><div class="input-wrapper"><select id="s2-forme"><option value="rond">Rond (actuel)</option><option value="carre">Carré</option></select></div></div>
                    </div>
                    <div class="control-group js-carre-niveau" data-section="2" style="display: none;">
                        <div class="label-row"><label>Niveau de carré</label><span class="carre-niveau-value">0 %</span></div>
                        <input type="range" id="s2-carre-niveau" min="0" max="100" value="0">
                    </div>
                </div>
            </div>

            <div class="setting-card setting-card--rattachement">
                <button class="accordion sub-accordion">Rattachement 2</button>
                <div class="panel-controls">
                    <div class="control-group">
                        <div class="label-row"><label>Profil</label><div class="input-wrapper"><select id="r23-type"><option value="ligne">Ligne</option><option value="courbe">Courbe</option><option value="courbeS">Courbe S</option></select></div></div>
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Rayon courbure ρ (mm)</label><div class="input-wrapper"><input type="number" id="r23-rho" value="40" min="5" max="120"><span class="unit">mm</span></div></div>
                        <input type="range" id="r23-rho-slider" min="5" max="120" step="1" value="40">
                    </div>
                </div>
            </div>

            <div class="setting-card">
                <button class="accordion main-accordion">3 — Épaule</button>
                <div class="panel-controls">
                    <div class="control-group">
                        <div class="label-row"><label>Hauteur (mm)</label><div class="input-wrapper"><input type="number" id="s3-h" value="120" min="0" max="350"><span class="unit">mm</span></div></div>
                        <input type="range" id="s3-h-slider" min="0" max="350" step="0.5" value="120">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Largeur (mm)</label><div class="input-wrapper"><input type="number" id="s3-L" value="85" min="20" max="120"><span class="unit">mm</span></div></div>
                        <input type="range" id="s3-L-slider" min="20" max="120" step="0.5" value="85">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Profondeur (mm)</label><div class="input-wrapper"><input type="number" id="s3-P" value="85" min="20" max="120"><span class="unit">mm</span></div></div>
                        <input type="range" id="s3-P-slider" min="20" max="120" step="0.5" value="85">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Forme</label><div class="input-wrapper"><select id="s3-forme"><option value="rond">Rond (actuel)</option><option value="carre">Carré</option></select></div></div>
                    </div>
                    <div class="control-group js-carre-niveau" data-section="3" style="display: none;">
                        <div class="label-row"><label>Niveau de carré</label><span class="carre-niveau-value">0 %</span></div>
                        <input type="range" id="s3-carre-niveau" min="0" max="100" value="0">
                    </div>
                </div>
            </div>

            <div class="setting-card setting-card--rattachement">
                <button class="accordion sub-accordion">Rattachement 3</button>
                <div class="panel-controls">
                    <div class="control-group">
                        <div class="label-row"><label>Profil</label><div class="input-wrapper"><select id="r34-type"><option value="ligne">Ligne</option><option value="courbe">Courbe</option><option value="courbeS">Courbe S</option></select></div></div>
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Rayon courbure ρ (mm)</label><div class="input-wrapper"><input type="number" id="r34-rho" value="0" min="0" max="40"><span class="unit">mm</span></div></div>
                        <input type="range" id="r34-rho-slider" min="0" max="40" step="0.5" value="0">
                    </div>
                </div>
            </div>

            <div class="setting-card">
                <button class="accordion main-accordion">4 — Col</button>
                <div class="panel-controls">
                    <div class="control-group">
                        <div class="label-row"><label>Hauteur (mm)</label><div class="input-wrapper"><input type="number" id="s4-h" value="200" min="20" max="250"><span class="unit">mm</span></div></div>
                        <input type="range" id="s4-h-slider" min="20" max="250" step="1" value="200">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Largeur (mm)</label><div class="input-wrapper"><input type="number" id="s4-L" value="32" min="20" max="70"><span class="unit">mm</span></div></div>
                        <input type="range" id="s4-L-slider" min="20" max="70" step="0.5" value="32">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Profondeur (mm)</label><div class="input-wrapper"><input type="number" id="s4-P" value="32" min="20" max="70"><span class="unit">mm</span></div></div>
                        <input type="range" id="s4-P-slider" min="20" max="70" step="0.5" value="32">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Forme</label><div class="input-wrapper"><select id="s4-forme"><option value="rond">Rond (actuel)</option><option value="carre">Carré</option></select></div></div>
                    </div>
                    <div class="control-group js-carre-niveau" data-section="4" style="display: none;">
                        <div class="label-row"><label>Niveau de carré</label><span class="carre-niveau-value">0 %</span></div>
                        <input type="range" id="s4-carre-niveau" min="0" max="100" value="0">
                    </div>
                </div>
            </div>

            <div class="setting-card setting-card--rattachement">
                <button class="accordion sub-accordion">Rattachement 4</button>
                <div class="panel-controls">
                    <div class="control-group">
                        <div class="label-row"><label>Profil</label><div class="input-wrapper"><select id="r45-type"><option value="ligne">Ligne</option><option value="courbe">Courbe</option><option value="courbeS">Courbe S</option></select></div></div>
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Rayon courbure ρ (mm)</label><div class="input-wrapper"><input type="number" id="r45-rho" value="20" min="5" max="60"><span class="unit">mm</span></div></div>
                        <input type="range" id="r45-rho-slider" min="5" max="60" step="1" value="20">
                    </div>
                </div>
            </div>

            <div class="setting-card">
                <button class="accordion main-accordion">5 — Bas col</button>
                <div class="panel-controls">
                    <div class="control-group">
                        <div class="label-row"><label>Hauteur (mm)</label><div class="input-wrapper"><input type="number" id="s5-h" value="280" min="0" max="350"><span class="unit">mm</span></div></div>
                        <input type="range" id="s5-h-slider" min="0" max="350" step="0.5" value="280">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Largeur (mm)</label><div class="input-wrapper"><input type="number" id="s5-L" value="32" min="20" max="50"><span class="unit">mm</span></div></div>
                        <input type="range" id="s5-L-slider" min="20" max="50" step="0.5" value="32">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Profondeur (mm)</label><div class="input-wrapper"><input type="number" id="s5-P" value="32" min="20" max="50"><span class="unit">mm</span></div></div>
                        <input type="range" id="s5-P-slider" min="20" max="50" step="0.1" value="32">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Forme</label><div class="input-wrapper"><select id="s5-forme"><option value="rond">Rond (actuel)</option><option value="carre">Carré</option></select></div></div>
                    </div>
                    <div class="control-group js-carre-niveau" data-section="5" style="display: none;">
                        <div class="label-row"><label>Niveau de carré</label><span class="carre-niveau-value">0 %</span></div>
                        <input type="range" id="s5-carre-niveau" min="0" max="100" value="0">
                    </div>
                </div>
            </div>

            <div class="setting-card setting-card--rattachement">
                <button class="accordion sub-accordion">Rattachement 5</button>
                <div class="panel-controls">
                    <div class="control-group">
                        <div class="label-row"><label>Profil</label><div class="input-wrapper"><select id="r56-type"><option value="ligne">Ligne</option><option value="courbe">Courbe</option><option value="courbeS">Courbe S</option></select></div></div>
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Rayon courbure ρ (mm)</label><div class="input-wrapper"><input type="number" id="r56-rho" value="0" min="0" max="15"><span class="unit">mm</span></div></div>
                        <input type="range" id="r56-rho-slider" min="0" max="15" step="0.5" value="0">
                    </div>
                </div>
            </div>

            <div class="setting-card">
                <button class="accordion main-accordion">6 — Bague</button>
                <div class="panel-controls">
                    <div class="control-group">
                        <div class="label-row"><label>Hauteur (mm)</label><div class="input-wrapper"><input type="number" id="s6-h" value="15" min="5" max="40"><span class="unit">mm</span></div></div>
                        <input type="range" id="s6-h-slider" min="5" max="40" step="1" value="15">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Largeur (mm)</label><div class="input-wrapper"><input type="number" id="s6-L" value="29.6" min="20" max="50" step="0.1"><span class="unit">mm</span></div></div>
                        <input type="range" id="s6-L-slider" min="20" max="50" step="0.1" value="29.6">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Profondeur (mm)</label><div class="input-wrapper"><input type="number" id="s6-P" value="29.6" min="20" max="50" step="0.1"><span class="unit">mm</span></div></div>
                        <input type="range" id="s6-P-slider" min="20" max="50" step="0.1" value="29.6">
                    </div>
                    <div class="control-group">
                        <div class="label-row"><label>Forme</label><div class="input-wrapper"><select id="s6-forme"><option value="rond">Rond (actuel)</option><option value="carre">Carré</option></select></div></div>
                    </div>
                    <div class="control-group js-carre-niveau" data-section="6" style="display: none;">
                        <div class="label-row"><label>Niveau de carré</label><span class="carre-niveau-value">0 %</span></div>
                        <input type="range" id="s6-carre-niveau" min="0" max="100" value="0">
                    </div>
                </div>
            </div>

            </div><!-- #panel-content-sections -->
            <div class="panel-content panel-gravure-content hidden" id="panel-content-gravure">
                <button type="button" class="btn-add-gravure" id="btn-add-engraving">Ajouter une gravure</button>
                <div id="engravings-container"></div>
            </div>
        </aside>

        <div id="right-column">
            
            <div id="Panel-haut">
                <div class="panel-haut-bar">
                    <div class="dropdown">
                        <button id="btn-fichier-menu" class="btn-fichier" type="button">Fichier</button>
                        <div id="fichier-dropdown" class="dropdown-content dropdown-right hidden">
                            <button id="btn-open-workspace">Ouvrir</button>
                            <button id="btn-save">Enregistrer</button>
                            <button id="btn-save-as">Enregistrer sous...</button>
                            <button id="btn-export-3d">Exporter 3D</button>
                            <button id="btn-export-2d">Exporter 2D</button>
                            <hr style="border: none; border-top: 1px solid rgba(0,0,0,0.1); margin: 5px 0;">
                            <button id="btn-back-menu">Retour au site web</button>
                        </div>
                    </div>
                    <span class="panel-haut-label">Affichage</span>
                </div>
                <div class="panel-haut-bar panel-haut-vues">
                    <div class="view-switcher">
                        <button id="btn-view-3d" class="active">3D</button>
                        <button id="btn-view-2d">2D</button>
                        <button id="btn-outillage">OUTILLAGE</button>
                    </div>
                </div>
            </div>

            <div id="workspace-content">
                <main id="viewport-3d"></main>
                <main id="viewport-2d" class="hidden"><canvas id="canvas-2d"></canvas></main>
                <main id="viewport-outillage" class="hidden"><div class="placeholder-outillage"><h1>PROCHAINEMENT</h1></div></main>
            </div>

        </div>
    </section>

    <script src="js/state.js"></script>
    <script src="js/math.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/export.js"></script>
    <script src="js/gravure.js"></script>
    <script src="js/viewer.js"></script>
    <script src="js/viewer2d.js"></script> 
    <script src="js/main.js"></script>
</body>
</html>
